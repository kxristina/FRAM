<!DOCTYPE html>
<html>
    <head>
        <title>FRAM</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Frank+Ruhl+Libre:wght@300&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <nav class="navbar">
            
          <button class="menu-btn">
           ☰
          </button>

          <h1 class="logo">FRAM</h1>

          <button class="cart-button">
            0
          </button>

        </nav>

        <section class="intro">

            <img
            src="images/header.png"
            alt="Mountain landscape"
            class="intro-image"
        >

            <div class="overlay-content">

                <h2 class="intro-title">FRAM</h2>

                <div class="divider"></div>

                <p class="tagline">
                    Home delivery from<br>your local farms
                </p>

            </div>

        </section>

        <!-- SELECTION PAGE -->

        <section class="container">

            <!-- Card 1 -->
            <div class="card">

              <h3>SHOP OUR SEASONAL SELECTION</h3>

              <p class="subtitle">Updated every week</p>

              <img src="images/shop selection.png" alt="Vegetables">

              <p class="description">
                New produce is added continuously as time goes by
                and the seasons change.
              </p>

              <button>Browse our selection</button>

           </div>

           <!-- Card 2 -->
           <div class="card">
              <h3>ASK US ABOUT ANYTHING</h3>

              <p class="subtitle">All your questions answered</p>

              <img src="images/chat.png" alt="Farmer">

              <p class="description">
                New produce is added continuously as time goes by
                and the seasons change.
              </p>

              <button>Go to chat</button>

           </div>

    </section>


    </body>
</html>
